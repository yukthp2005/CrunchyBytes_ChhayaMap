<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHHAYA | Thermal Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h1>PROJECT CHHAYA</h1>

        <div class="module">
            <h3>🏆 WARD RISK LEADERBOARD</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div class="module">
            <h3>📍 THERMAL NAVIGATION</h3>
            <input type="text" id="start-input" placeholder="Set Start Location" readonly onclick="setMode('start')">
            <input type="text" id="end-input" placeholder="Set Destination" readonly onclick="setMode('end')">
            <div class="slider-box">
                <label>SUN SENSITIVITY: <span id="sens-label">50</span>%</label>
                <input type="range" id="sens-slider" min="1" max="100" value="50" oninput="document.getElementById('sens-label').innerText=this.value">
            </div>
            <button class="btn-primary" onclick="getRoute()">Find Practical Path</button>
            <div id="route-data" style="display:none; margin-top:10px;">
                <span id="uv-score" class="savings">--</span>
                <ul id="steps-ul"></ul>
            </div>
        </div>

        <div class="module sim-box">
            <h3>🌳 TREE ROI SIMULATOR</h3>
            <select id="sim-ward" style="width:100%; padding:5px; margin-bottom:5px;">
                <option value="Mandi Mohalla">Mandi Mohalla</option>
                <option value="Devaraja Mohalla">Devaraja Mohalla</option>
            </select>
            <input type="number" id="sim-count" value="200" style="width:60px;">
            <button onclick="runSimulation()" class="btn-primary" style="background:#2e7d32;">PLANT TREES</button>
            <div id="sim-impact" style="display:none; font-size:0.75rem; color:#1b5e20; margin-top:10px;">
                <strong>IMPACT:</strong> <span id="res-temp"></span> | <span id="res-roi"></span>
            </div>
        </div>

        <div class="module">
            <h3>🔍 ALBEDO FORENSIC AUDIT</h3>
            <button class="btn-secondary" onclick="runAudit()">SCAN SURFACE ALBEDO</button>
        </div>

        <button class="btn-audit" onclick="alert('Proposal Exported to MCC.')">GENERATE MUNICIPAL AUDIT</button>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
