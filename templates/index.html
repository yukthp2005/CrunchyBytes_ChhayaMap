<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHHAYA | Thermal Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h1>PROJECT CHHAYA</h1>

        <div class="module">
            <h3>🏆 Ward Risk Leaderboard</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div class="module">
            <h3>📍 Route Optimization</h3>
            <input type="text" id="start-input" placeholder="Set A" readonly onclick="setMode('start')">
            <input type="text" id="end-input" placeholder="Set B" readonly onclick="setMode('end')">
            <div style="margin:8px 0;"><input type="range" id="sens-slider" min="1" max="100" style="width:100%;"></div>
            <button class="btn-primary" onclick="getBalancedRoute()">Find Coolest Path</button>
            <div id="route-res" style="display:none; font-size:0.8rem; margin-top:10px; color:#1e8e3e;">
                <strong>UV PROTECT: <span id="uv-val"></span></strong>
            </div>
        </div>

        <div class="module" style="background:#f1f8e9; border-color:#81c784;">
            <h3>🌳 Tree ROI Simulator</h3>
            <select id="sim-ward" style="width:100%; padding:5px; margin-bottom:5px;">
                <option value="Mandi Mohalla">Mandi Mohalla</option>
                <option value="Devaraja Mohalla">Devaraja Mohalla</option>
            </select>
            <input type="number" id="sim-count" value="100" style="width:50px;">
            <button onclick="runSimulation()" class="btn-primary" style="background:#2e7d32; width:auto;">Plant</button>
            <div id="sim-res" style="display:none; font-size:0.7rem; margin-top:5px; color:#2e7d32;">
                <span id="res-temp"></span> | <span id="res-roi"></span>
            </div>
        </div>

        <div class="module" style="background:#fffcf0; border-color:#ffe082;">
            <h3>⚠️ Report Dead Zone</h3>
            <div id="audit-target" style="font-size:0.7rem; margin-bottom:5px;">TARGET: VOID</div>
            <input type="file" id="evidence-file">
            <button class="btn-primary" style="background:#f9a825;" onclick="uploadEvidence()">Submit</button>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
